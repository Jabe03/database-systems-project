<!DOCTYPE html>
<html>
<head>
    <title>Students Table</title>
</head>
<body>
    <h1>Students</h1>

    <p><a href="index.html">Back to index</a></p>

    <button id="refreshButton">Refresh Students</button>

    <h2>Current Students</h2>
    <div id="tableContainer"></div>

    <h2>Create New Student</h2>

    <form id="createStudentForm">
        <label>StudentID: <input name="StudentID" required></label><br>
        <label>FirstName: <input name="FirstName" required></label><br>
        <label>LastName: <input name="LastName" required></label><br>
        <label>Email: <input name="Email" required></label><br>
        <label>AGE: <input name="AGE" required></label><br>
        <label>Year: <input name="Year" required></label><br>

        <button type="submit">Create Student</button>
    </form>

    <h2>Raw Response</h2>
    <pre id="result"></pre>

    <script type="module">
        import { makeRequest, renderTable } from "./scripts/database_page.js";

        const studentConfig = {
            tableName: "Students",
            primaryKey: "StudentID",
            containerId: "tableContainer",

            onEdit: async function (studentId, columns, row) {
                const currentEmail = row[columns.indexOf("Email")];
                const newEmail = prompt("Enter new email:", currentEmail);

                if (!newEmail) return;

                await makeRequest("POST Students/" + studentId + " " + JSON.stringify({
                    Email: newEmail
                }));

                await loadStudents();
            },

            onDelete: async function (studentId) {
                await makeRequest("DELETE Students/" + studentId);
                await loadStudents();
            }
        };

        async function loadStudents() {
            const data = await makeRequest("GET Students");
            renderTable(data, studentConfig);
        }

        document.getElementById("refreshButton").addEventListener("click", loadStudents);

        document.getElementById("createStudentForm").addEventListener("submit", async function (event) {
            event.preventDefault();

            const formData = new FormData(event.target);

            const body = {
                StudentID: formData.get("StudentID"),
                FirstName: formData.get("FirstName"),
                LastName: formData.get("LastName"),
                Email: formData.get("Email"),
                AGE: formData.get("AGE"),
                Year: formData.get("Year")
            };

            await makeRequest("POST Students " + JSON.stringify(body));

            event.target.reset();
            await loadStudents();
        });

        loadStudents();
    </script>
</body>
</html>
