<!DOCTYPE html>
<html>
<head>
    <title>Tutor Sessions Table</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        form { margin-bottom: 20px; border-bottom: 1px dashed #ccc; padding-bottom: 10px; margin-top: 10px;}
        input, select, button { display: block; margin: 5px 0; padding: 5px; width: 100%; max-width: 300px;}
        button { background-color: #0056b3; color: white; border: none; cursor: pointer; padding: 8px;}
        button:hover { background-color: #004494; }
        table { border-collapse: collapse; margin-top: 15px; width: 100%; max-width: 800px; }
        table, th, td { border: 1px solid black; padding: 8px; text-align: left; }
        th { background-color: #f4f4f4; }
        pre { background: #eee; padding: 10px; max-width: 800px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>Tutor Sessions</h1>

    <p><a href="index.html">Back to index</a></p>

    <button id="refreshButton">Refresh Tutor Sessions</button>

    <h2>Current Tutor Sessions</h2>
    <div id="tableContainer"></div>

    <h2>Create New Tutor Session</h2>

    <form id="createTutorSessionForm">
        <label>SessionID: <input name="SessionID" required></label><br>
        <label>SessionDate: <input name="SessionDate" placeholder="YYYY-MM-DD" required></label><br>
        <label>Length: <input name="Length" required></label><br>
        <label>Location: <input name="Location" required></label><br>
        <label>ScheduledStatus: <input name="ScheduledStatus" required></label><br>
        <label>TutorID: <input name="TutorID" required></label><br>
        <label>StudentID: <input name="StudentID" required></label><br>

        <button type="submit">Create Tutor Session</button>
    </form>

    <h2>Raw Response</h2>
    <pre id="result"></pre>

    <script type="module">
        import { makeRequest, renderTable } from "./scripts/database_page.js";

        const tutorSessionConfig = {
            tableName: "TutorSession",
            primaryKey: "SessionID",
            containerId: "tableContainer",

            onEdit: async function (sessionId, columns, row) {
                await editRow("TutorSession", "SessionID", sessionId, columns, row, loadTutorSessions);
            },

            onDelete: async function (sessionId) {
                await makeRequest("DELETE TutorSession/" + sessionId);
                await loadTutorSessions();
            }
        };

        async function editRow(tableName, primaryKey, pkValue, columns, row, reloadFunction) {
            const body = {};

            for (let i = 0; i < columns.length; i++) {
                const column = columns[i];

                if (column === primaryKey) {
                    continue;
                }

                const currentValue = row[i];
                const newValue = prompt("Enter new value for " + column + ":", currentValue);

                if (newValue === null) {
                    return;
                }

                if (newValue !== String(currentValue)) {
                    body[column] = newValue;
                }
            }

            if (Object.keys(body).length === 0) {
                alert("No changes made.");
                return;
            }

            await makeRequest("POST " + tableName + "/" + pkValue + " " + JSON.stringify(body));
            await reloadFunction();
        }

        async function loadTutorSessions() {
            const data = await makeRequest("GET TutorSession");
            renderTable(data, tutorSessionConfig);
        }

        document.getElementById("refreshButton").addEventListener("click", loadTutorSessions);

        document.getElementById("createTutorSessionForm").addEventListener("submit", async function (event) {
            event.preventDefault();

            const formData = new FormData(event.target);

            const body = {
                SessionID: formData.get("SessionID"),
                SessionDate: formData.get("SessionDate"),
                Length: formData.get("Length"),
                Location: formData.get("Location"),
                ScheduledStatus: formData.get("ScheduledStatus"),
                TutorID: formData.get("TutorID"),
                StudentID: formData.get("StudentID")
            };

            await makeRequest("POST TutorSession " + JSON.stringify(body));

            event.target.reset();
            await loadTutorSessions();
        });

        loadTutorSessions();
    </script>
</body>
</html>
