<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Sessions</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        form { margin-bottom: 20px; border-bottom: 1px dashed #ccc; padding-bottom: 10px; margin-top: 10px;}
        input, select, button { display: block; margin: 5px 0; padding: 5px; width: 100%; max-width: 300px;}
        button { background-color: #0056b3; color: white; border: none; cursor: pointer; }
        button:hover { background-color: #004494; }
        table, th, td { border: 1px solid black; border-collapse: collapse; padding: 8px; margin-top: 10px; }
        th { background-color: #f4f4f4; }
    </style>
</head>
<body>

<nav>
    <a href="index.html">Back to Home</a>
</nav>

<h1>Manage Tutor Sessions</h1>

<form id="create-session">
    <h3>Schedule New Session</h3>
    <input type="text" id="c-ses-id" placeholder="Session ID (e.g., SS006)" required>
    <input type="date" id="c-ses-date" required>
    <input type="number" id="c-ses-len" placeholder="Length (mins)" required>
    <select id="c-ses-loc" required>
        <option value="" disabled selected>Select Location</option>
        <option value="library">Library</option>
        <option value="online">Online</option>
        <option value="study_room">Study Room</option>
    </select>
    <select id="c-ses-status" required>
        <option value="1">Scheduled (True)</option>
        <option value="0">Canceled (False)</option>
    </select>
    <input type="text" id="c-ses-tut" placeholder="Tutor ID" required>
    <input type="text" id="c-ses-stu" placeholder="Student ID" required>
    <button type="submit">Insert Session</button>
</form>

<form id="update-session">
    <h3>Update Session Details</h3>
    <input type="text" id="u-ses-id" placeholder="Session ID to update" required>
    <select id="u-ses-loc">
        <option value="" disabled selected>New Location (Optional)</option>
        <option value="library">Library</option>
        <option value="online">Online</option>
        <option value="study_room">Study Room</option>
    </select>
    <select id="u-ses-status">
        <option value="" disabled selected>Change Status (Optional)</option>
        <option value="1">Scheduled (True)</option>
        <option value="0">Canceled (False)</option>
    </select>
    <button type="submit">Update Session</button>
</form>

<form id="delete-session">
    <h3>Cancel/Remove Session</h3>
    <input type="text" id="d-ses-id" placeholder="Session ID to delete" required>
    <button type="submit" style="background-color: #dc3545;">Delete Session</button>
</form>

<div>
    <h3>View Sessions</h3>
    <button id="read-ses-btn" type="button">Refresh Session List</button>
    <div id="results-sessions"></div>
</div>

<script type="module" src="./dist/client.js"></script>
</body>
</html>
