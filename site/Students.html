<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Students</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        form { margin-bottom: 20px; border-bottom: 1px dashed #ccc; padding-bottom: 10px; margin-top: 10px;}
        input, select, button { display: block; margin: 5px 0; padding: 5px; width: 100%; max-width: 300px;}
        button { background-color: #0056b3; color: white; border: none; cursor: pointer; }
        button:hover { background-color: #004494; }
        table, th, td { border: 1px solid black; border-collapse: collapse; padding: 8px; margin-top: 10px; }
        th { background-color: #f4f4f4; }
    </style>
</head>
<body>

<nav>
    <a href="index.html">Back to Home</a>
</nav>

<h1>Manage Students</h1>

<form id="create-student">
    <h3>Add New Student</h3>
    <input type="text" id="c-stu-id" placeholder="Student ID (e.g., S006)" required>
    <input type="text" id="c-stu-first" placeholder="First Name" required>
    <input type="text" id="c-stu-last" placeholder="Last Name" required>
    <input type="email" id="c-stu-email" placeholder="Email (@uiowa.edu)" required>
    <input type="number" id="c-stu-age" placeholder="Age" required>
    <select id="c-stu-year" required>
        <option value="" disabled selected>Select Year</option>
        <option value="freshman">Freshman</option>
        <option value="sophomore">Sophomore</option>
        <option value="junior">Junior</option>
        <option value="senior">Senior</option>
    </select>
    <button type="submit">Insert Student</button>
</form>

<form id="update-student">
    <h3>Update Student Info</h3>
    <input type="text" id="u-stu-id" placeholder="Student ID to update" required>
    <input type="email" id="u-stu-email" placeholder="New Email (Optional)">
    <select id="u-stu-year">
        <option value="" disabled selected>Update Year (Optional)</option>
        <option value="freshman">Freshman</option>
        <option value="sophomore">Sophomore</option>
        <option value="junior">Junior</option>
        <option value="senior">Senior</option>
    </select>
    <button type="submit">Update Student</button>
</form>

<form id="delete-student">
    <h3>Remove Student</h3>
    <input type="text" id="d-stu-id" placeholder="Student ID to delete" required>
    <button type="submit" style="background-color: #dc3545;">Delete Student</button>
</form>

<div>
    <h3>View Students</h3>
    <button id="read-stu-btn" type="button">Refresh Student List</button>
    <div id="results-students"></div>
</div>

<script type="module" src="./dist/client.js"></script>
</body>
</html>
