<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Tutors</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        form { margin-bottom: 20px; border-bottom: 1px dashed #ccc; padding-bottom: 10px; margin-top: 10px;}
        input, select, button { display: block; margin: 5px 0; padding: 5px; width: 100%; max-width: 300px;}
        button { background-color: #0056b3; color: white; border: none; cursor: pointer; }
        button:hover { background-color: #004494; }
        table, th, td { border: 1px solid black; border-collapse: collapse; padding: 8px; margin-top: 10px; }
        th { background-color: #f4f4f4; }
    </style>
</head>
<body>

<nav>
    <a href="index.html">Back to Home</a>
</nav>

<h1>Manage Tutors</h1>

<form id="create-tutor">
    <h3>Add New Tutor</h3>
    <input type="text" id="c-tut-id" placeholder="Tutor ID (e.g., T006)" required>
    <input type="text" id="c-tut-first" placeholder="First Name" required>
    <input type="text" id="c-tut-last" placeholder="Last Name" required>
    <input type="email" id="c-tut-email" placeholder="Email" required>
    <input type="number" id="c-tut-rate" placeholder="Hourly Rate ($)" required>
    <button type="submit">Insert Tutor</button>
</form>

<form id="update-tutor">
    <h3>Update Tutor Info</h3>
    <input type="text" id="u-tut-id" placeholder="Tutor ID to update" required>
    <input type="number" id="u-tut-rate" placeholder="New Hourly Rate ($)">
    <button type="submit">Update Tutor</button>
</form>

<form id="delete-tutor">
    <h3>Remove Tutor</h3>
    <input type="text" id="d-tut-id" placeholder="Tutor ID to delete" required>
    <button type="submit" style="background-color: #dc3545;">Delete Tutor</button>
</form>

<div>
    <h3>View Tutors</h3>
    <button id="read-tut-btn" type="button">Refresh Tutor List</button>
    <div id="results-tutors"></div>
</div>

<script type="module" src="./dist/client.js"></script>
</body>
</html>
